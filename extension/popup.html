<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #f3f4f6;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #22d3ee;
      font-size: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: rgba(239, 68, 68, 0.2);
    }
    .input-group {
      margin-bottom: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 4px;
      font-size: 12px;
    }
    .status {
      font-size: 12px;
      color: #1f2124;
      text-align: center;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <h3>Tab Graveyard</h3>
  <div class="input-group">
    <label style="font-size: 10px; color: #9ca3af;">App URL (e.g., http://localhost:3000)</label>
    <input type="text" id="appUrl" placeholder="Enter deployed app URL" />
  </div>
  <button id="deleteBtn" class="btn">Delete & Close Tab</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
